name: Sync advisor-review to zzain fork

on:
  push:
    branches:
      - advisor-review
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    if: github.repository == 'mearslaw/mears-law'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push advisor-review to zzain fork
        env:
          ZZAIN_PUSH_TOKEN: ${{ secrets.ZZAIN_PUSH_TOKEN }}
        run: |
          if [ -z "$ZZAIN_PUSH_TOKEN" ]; then
            echo "Missing ZZAIN_PUSH_TOKEN secret."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add zzain "https://x-access-token:${ZZAIN_PUSH_TOKEN}@github.com/zzain0728/mears-law.git"
          git push --force zzain HEAD:advisor-review
